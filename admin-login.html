<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SecureTix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .admin-login-card {
            max-width: 450px;
            width: 100%;
        }
        .admin-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: white;
        }
        .failed-attempts {
            text-align: center;
            margin-top: 1rem;
            color: #dc3545;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="admin-icon">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>
                    <h2 class="text-center mb-4">Admin Access</h2>
                    <p class="text-center text-muted mb-4">Certificate Authority Control Panel</p>

                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle-fill"></i> This area is restricted to authorized administrators only.
                    </div>

                    <form id="adminLoginForm">
                        <div class="mb-4">
                            <label for="adminUsername" class="form-label">
                                <i class="bi bi-person-fill"></i> Username
                            </label>
                            <input type="text" class="form-control form-control-lg" id="adminUsername" required autocomplete="username">
                        </div>

                        <div class="mb-4">
                            <label for="adminPassword" class="form-label">
                                <i class="bi bi-key-fill"></i> Password
                            </label>
                            <input type="password" class="form-control form-control-lg" id="adminPassword" required autocomplete="current-password">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Access Admin Panel
                        </button>

                        <div class="text-center">
                            <a href="index.html" class="text-muted">
                                <i class="bi bi-arrow-left"></i> Back to Home
                            </a>
                        </div>
                    </form>

                    <div id="failedAttempts" class="failed-attempts" style="display: none;"></div>
                </div>
            </div>

            <div class="card mt-3 bg-dark text-white">
                <div class="card-body p-3">
                    <h6 class="mb-2"><i class="bi bi-info-circle-fill"></i> Default Admin Credentials</h6>
                    <p class="mb-1 small"><strong>Username:</strong> admin</p>
                    <p class="mb-0 small"><strong>Password:</strong> SecureAdmin2024!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <script src="app.js"></script>
    <script>
        let failedAttempts = 0;
        const MAX_ATTEMPTS = 5;
        let lockoutUntil = null;

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Check if locked out
            if (lockoutUntil && Date.now() < lockoutUntil) {
                const remainingTime = Math.ceil((lockoutUntil - Date.now()) / 1000);
                showFailedAttempt(`Account locked. Try again in ${remainingTime} seconds.`);
                return;
            }

            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            // Attempt login
            const success = adminLogin(username, password);

            if (success) {
                // Success - redirect to admin panel
                showLoading(true);
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 500);
            } else {
                // Failed attempt
                failedAttempts++;
                
                if (failedAttempts >= MAX_ATTEMPTS) {
                    // Lock out for 5 minutes
                    lockoutUntil = Date.now() + (5 * 60 * 1000);
                    showFailedAttempt('Too many failed attempts. Account locked for 5 minutes.');
                    
                    // Disable form
                    document.getElementById('adminLoginForm').querySelectorAll('input, button').forEach(el => {
                        el.disabled = true;
                    });
                    
                    // Re-enable after timeout
                    setTimeout(() => {
                        failedAttempts = 0;
                        lockoutUntil = null;
                        document.getElementById('adminLoginForm').querySelectorAll('input, button').forEach(el => {
                            el.disabled = false;
                        });
                        document.getElementById('failedAttempts').style.display = 'none';
                    }, 5 * 60 * 1000);
                } else {
                    const remaining = MAX_ATTEMPTS - failedAttempts;
                    showFailedAttempt(`Invalid credentials. ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.`);
                }

                // Clear password field
                document.getElementById('adminPassword').value = '';
            }
        });

        function showFailedAttempt(message) {
            const failedDiv = document.getElementById('failedAttempts');
            failedDiv.textContent = message;
            failedDiv.style.display = 'block';

            // Shake animation
            const card = document.querySelector('.admin-login-card');
            card.style.animation = 'shake 0.5s';
            setTimeout(() => {
                card.style.animation = '';
            }, 500);
        }

        // Check if already logged in
        if (isAdmin()) {
            window.location.href = 'admin.html';
        }
    </script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
    </style>
</body>
</html>
